name: "Windows Installer"

# Builds the EarWitness Windows (x64) NSIS installer and, on a version tag,
# publishes it to the same GitHub Release as the other platforms.
#
# Notes:
# - The official Windows OTP ships a working wx (verified), so no wxWidgets
#   build is needed here.
# - The whisper transcription NIF is now built on Windows (Makefile.win builds
#   whisper.cpp's static libs via CMake/MSVC and links priv\nif.dll). The
#   "Verify the whisper NIF loads" step below smoke-tests that it initializes.
#   As elsewhere, the whisper model itself is downloaded at first run, not
#   bundled.
on:
  # Auto-publish re-enabled: the miniaudio capture NIF (which replaced
  # Membrane/shmex — see the miniaudio-capture ADR) has now been exercised on
  # real Windows. A CI build produced a working installer, and a capture smoke
  # test on Windows confirmed EarWitness.Audio.Miniaudio.list_devices/0
  # enumerates WASAPI devices with loopback_available? = true. wx ships with the
  # OTP install. (Not yet validated: the wx GUI window on a real desktop
  # session, and whisper transcription — skipped on Windows, no-op Makefile.win.)
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  OTP_VERSION: "29.0.3"
  ELIXIR_VERSION: "1.20.2-otp-29"

jobs:
  windows:
    name: "Build Windows installer (.exe)"
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/Elixir (with wx)
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Verify wx is available
        shell: pwsh
        run: |
          $code = 'case (catch wx:new()) of {wx_ref,_,_,_} -> io:format("WX_OK~n"); O -> io:format("WX_FAIL ~p~n",[O]), halt(1) end, halt().'
          erl -noshell -eval $code

      - name: Set up MSVC dev environment (exqlite nmake + Rust link)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install packaging tools (NSIS, ImageMagick)
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          choco install imagemagick --no-progress -y
          # Make them available to later steps.
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show toolchain
        shell: pwsh
        run: |
          elixir --version
          rustc --version
          node --version
          where.exe makensis
          where.exe magick

      - name: Build release + installer
        shell: pwsh
        env:
          MIX_ENV: prod
          # Baked into the release at compile time by config/prod.exs so the
          # support widget can connect from shipped installs.
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          Push-Location assets; npm install; Pop-Location
          mix assets.setup
          mix assets.deploy
          mix desktop.installer

      - name: Verify the whisper NIF loads
        shell: pwsh
        env:
          MIX_ENV: prod
        run: |
          # Prove priv\nif.dll actually loaded, not that it merely compiled.
          # transcribe_files/2 with a non-list first arg hits the NIF's argument
          # check and raises ArgumentError (badarg) BEFORE any whisper/model
          # work — so this needs no model. The Elixir stub, by contrast, would
          # exit(:nif_library_not_loaded). Distinguishing the two proves the
          # native library initialized.
          $code = @'
          probe = fn ->
            try do
              EarWitness.Transcribe.transcribe_files(:not_a_list, "")
              :returned_without_raising
            rescue
              ArgumentError -> :nif_loaded
            catch
              :exit, :nif_library_not_loaded -> :stub_not_loaded
              kind, reason -> {:unexpected, kind, reason}
            end
          end
          result = probe.()
          IO.puts("nif probe: #{inspect(result)}")
          if result != :nif_loaded, do: System.halt(1)
          '@
          $code | Out-File -FilePath nif_probe.exs -Encoding utf8
          mix run --no-start nif_probe.exs

      - name: Locate the .exe installer
        shell: pwsh
        run: |
          Get-ChildItem _build\prod\*.exe | Select-Object -First 1 | ForEach-Object { "Built: $($_.FullName)" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EarWitness-windows-exe
          path: _build/prod/*.exe

      - name: Publish to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: _build/prod/*.exe
          fail_on_unmatched_files: true
