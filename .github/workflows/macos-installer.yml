name: "macOS Installer"

# Builds the EarWitness macOS .dmg and, on a version tag, publishes it to a
# GitHub Release. Without an Apple Developer ID the bundle is ad-hoc signed
# (runs locally / right-click-Open); notarization can be added later by setting
# the MACOS_PEM / notarization secrets.
on:
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Match .tool-versions (the runtime the app is tested against locally).
  OTP_VERSION: "29.0.3"
  ELIXIR_VERSION: "1.20.2-otp-29"
  # OTP 29's wx driver only builds against wxWidgets 3.2.x built with
  # --enable-compat30. Homebrew's wxWidgets (3.3, no compat30) makes OTP disable
  # wx entirely — the app then crash-loops at launch on a missing wxe_driver.so.
  WX_VERSION: "v3.2.6"

jobs:
  macos:
    name: "Build macOS installer (.dmg)"
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (cmake, autotools, image libs)
        run: |
          brew update
          # libpng/jpeg/tiff: wxWidgets' *bundled* libpng includes the ancient
          # <fp.h> header and won't compile against a modern macOS SDK, so we
          # build wx against the Homebrew image libraries instead.
          brew install cmake automake autoconf libtool coreutils libpng jpeg libtiff

      - name: Install Rust toolchain (ortex NIF)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js (assets)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache wxWidgets (static, compat30)
        id: wx-cache
        uses: actions/cache@v4
        with:
          path: ~/wxWidgets-install
          key: wxwidgets-${{ env.WX_VERSION }}-static-compat30-macos15

      - name: Build wxWidgets from source
        if: steps.wx-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$WX_VERSION" https://github.com/wxWidgets/wxWidgets.git "$HOME/wxWidgets-src"
          cd "$HOME/wxWidgets-src"
          git submodule update --init --depth 1
          # Homebrew image libs aren't on the default Apple-Silicon search path,
          # so point the compiler/pkg-config at their kegs.
          PNG_P="$(brew --prefix libpng)"; JPEG_P="$(brew --prefix jpeg)"; TIFF_P="$(brew --prefix libtiff)"
          export CPPFLAGS="-I$PNG_P/include -I$JPEG_P/include -I$TIFF_P/include"
          export LDFLAGS="-L$PNG_P/lib -L$JPEG_P/lib -L$TIFF_P/lib"
          export PKG_CONFIG_PATH="$PNG_P/lib/pkgconfig:$JPEG_P/lib/pkgconfig:$TIFF_P/lib/pkgconfig"
          # Static wx core (--disable-shared); compat30 + webview are what
          # elixir-desktop needs. Use system image libs (Homebrew) to avoid
          # wxWidgets' bundled libpng, which won't build on a modern SDK.
          ./configure --prefix="$HOME/wxWidgets-install" \
            --enable-webview --enable-compat30 --disable-shared --disable-debug \
            --with-libpng=sys --with-libjpeg=sys --with-libtiff=sys
          make -j"$(sysctl -n hw.ncpu)"
          make install

      - name: Cache asdf toolchain (Erlang/Elixir with wx)
        id: asdf-cache
        uses: actions/cache@v4
        with:
          path: ~/.asdf
          key: asdf-macos15-otp-${{ env.OTP_VERSION }}-elixir-${{ env.ELIXIR_VERSION }}-${{ env.WX_VERSION }}-compat30

      - name: Install Erlang/Elixir with wx (asdf)
        if: steps.asdf-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          git clone https://github.com/asdf-vm/asdf.git "$HOME/.asdf" --branch v0.14.1
          . "$HOME/.asdf/asdf.sh"
          asdf plugin add erlang
          asdf plugin add elixir
          # wx-config from our source-built wxWidgets must be found so OTP builds
          # a usable :wx (with the wxe_driver.so C driver).
          export PATH="$HOME/wxWidgets-install/bin:$PATH"
          export KERL_CONFIGURE_OPTIONS="--with-wxdir=$HOME/wxWidgets-install --disable-debug --without-javac"
          asdf install erlang "$OTP_VERSION"
          asdf install elixir "$ELIXIR_VERSION"

      - name: Verify the wx driver actually built
        run: |
          set -euo pipefail
          . "$HOME/.asdf/asdf.sh"
          asdf global erlang "$OTP_VERSION"
          asdf global elixir "$ELIXIR_VERSION"
          elixir --version
          # The real check: the C driver must exist, or the desktop app
          # crash-loops at launch with {:load_driver, "No driver found"}.
          erlroot="$(asdf where erlang "$OTP_VERSION")"
          driver="$(ls "$erlroot"/lib/wx-*/priv/wxe_driver.so 2>/dev/null || true)"
          if [ -z "$driver" ]; then
            echo "wxe_driver.so was NOT built — OTP disabled wx. Check wxWidgets compat30." >&2
            exit 1
          fi
          echo "wx driver present: $driver"

      - name: Build release + installer
        run: |
          set -euo pipefail
          . "$HOME/.asdf/asdf.sh"
          export PATH="$HOME/wxWidgets-install/bin:$PATH"
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          (cd assets && npm install)
          mix assets.setup
          mix assets.deploy
          MIX_ENV=prod mix desktop.installer

      - name: Verify the bundle is valid (wx driver bundled + signed)
        run: |
          set -euo pipefail
          APP="_build/prod/EarWitness.app"
          # The wx driver must be in the packaged app, or it crash-loops.
          ls "$APP"/Contents/Resources/lib/wx-*/priv/wxe_driver.so
          # Recursively verifies nested code + the bundle seal.
          codesign --verify --verbose "$APP"
          # No dylib/NIF may have an invalid signature (Tahoe SIGKILLs those on
          # load). Loop via process substitution so a failure sticks and the
          # giant precompiled-dep paths don't overflow xargs.
          bad=0
          while IFS= read -r -d '' f; do
            codesign -v "$f" 2>/dev/null || { echo "INVALID: $f"; bad=1; }
          done < <(find "$APP" \( -name '*.so' -o -name '*.dylib' \) -print0)
          [ "$bad" -eq 0 ]

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EarWitness-macOS-dmg
          path: _build/prod/*.dmg

      - name: Publish to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: _build/prod/*.dmg
          fail_on_unmatched_files: true
